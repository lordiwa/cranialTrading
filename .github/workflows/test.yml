name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:unit
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vue-tsc --noEmit

  build:
    needs: [unit-tests, type-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build (dev mode for develop branch, prod mode for main)
        run: |
          if [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            npx vite build --mode development
          else
            npx vite build
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── E2E tests (single job to share cached Firebase auth and avoid rate-limiting) ──
  e2e:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      CI: true
      TEST_USER_A_EMAIL: ${{ secrets.TEST_USER_A_EMAIL }}
      TEST_USER_A_PASSWORD: ${{ secrets.TEST_USER_A_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create .env.local
        run: |
          echo "TEST_USER_A_EMAIL=${TEST_USER_A_EMAIL}" >> .env.local
          echo "TEST_USER_A_PASSWORD=${TEST_USER_A_PASSWORD}" >> .env.local
      - name: Validate test credentials
        run: |
          if [ -z "$TEST_USER_A_EMAIL" ] || [ -z "$TEST_USER_A_PASSWORD" ]; then
            echo "::error::Missing TEST_USER_A_EMAIL or TEST_USER_A_PASSWORD secrets"
            exit 1
          fi
      - name: Run all E2E tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/

  # ── Deploy to Dev (gated on E2E tests) ──────────────────────────
  deploy-dev:
    needs: [build, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEV }}
          projectId: cranial-trading-dev
          channelId: live

  # ── Deploy to Production (gated on all E2E tests) ──────────────────
  deploy-prod:
    needs: [build, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: live
